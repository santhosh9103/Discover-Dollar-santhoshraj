name: CI/CD Pipeline 🚀

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Login to Docker Hub
      - name: Docker Hub Login 🔐
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build Backend Docker Image
      - name: Build Backend Image 🐳
        run: |
          docker build --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/dd-backend:latest ./backend

      # 4️⃣ Build Frontend Docker Image
      - name: Build Frontend Image 🐳
        run: |
          docker build --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/dd-frontend:latest ./frontend

      # 5️⃣ Push Images to Docker Hub
      - name: Push Images 🚀
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/dd-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/dd-frontend:latest

      # 6️⃣ Deploy to EC2
      - name: Deploy to EC2 ☁️🔥
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd Discover-Dollar-santhoshraj
            git pull origin main
            docker pull ${{ secrets.DOCKER_USERNAME }}/dd-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/dd-frontend:latest
            docker-compose down
            docker-compose up -d
